# Mara: Docker Compose config
# Startet PHP-Webserver + MySQL in separaten Containern

version: '3.8'

services:

  # Mara: PHP-Applikation mit Apache
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: m307_app
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_USER: m307user
      DB_PASS: m307pass
      DB_NAME: project_admin_tool

  # Noemi: MySQL Datenbank
  db:
    image: mysql:8.0
    container_name: m307_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: project_admin_tool
      MYSQL_USER: m307user
      MYSQL_PASSWORD: m307pass
    volumes:
      - db_data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
